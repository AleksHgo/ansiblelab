---

- name: Configurar Servidores Web
  hosts: webservers
  become: true
  tasks:
    - name: Instalar Apache (httpd)
      package:
        name: httpd
        state: present

    - name: Iniciar y habilitar Apache
      service:
        name: httpd
        state: started
        enabled: yes

    - name: Crear pagina index.html
      copy:
        content: "<h1>Hola desde Ansible Automation Platform</h1>"
        dest: /var/www/html/index.html
